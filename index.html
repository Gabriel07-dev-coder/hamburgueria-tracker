<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Foody Admin | Rotas em Tempo Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #00bcd4; --text: #fff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        header { height: 70px; background: #151515; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; gap: 10px; }
        .dispatch-bar { flex: 1; display: flex; gap: 8px; }
        input { background: #252525; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .main-container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 350px; background: #151515; border-right: 1px solid #333; overflow-y: auto; padding: 15px; }
        #map { flex: 1; }
        .pedido-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--accent); }
        /* Esconde a caixa de instruções da rota para não poluir o mapa */
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: 800; color: var(--accent); margin-right: 15px;">FOODY</div>
        <div class="dispatch-bar">
            <input type="text" id="p-id" placeholder="Nº" style="width: 60px;">
            <input type="text" id="p-end" placeholder="Endereço em Curitiba..." style="flex: 1;">
            <input type="text" id="p-taxa" placeholder="Taxa R$" style="width: 80px;">
            <button id="btn-add">DESPACHAR</button>
        </div>
    </header>
    <div class="main-container">
        <aside class="sidebar">
            <h3>Pedidos Ativos <span id="contador-pedidos" style="background:var(--accent); padding:2px 8px; border-radius:10px; font-size:12px;">0</span></h3>
            <div id="lista-pedidos"></div>
        </aside>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
