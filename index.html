<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FOODY ADMIN - Curitiba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #121212; color: white; font-family: sans-serif; }
        #sidebar { width: 350px; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        #map { flex: 1; z-index: 1; }
        input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-despachar { background: #00bcd4; color: white; }
        .btn-salvar { background: #ffa502; color: white; }
        .pedido-card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid #00bcd4; }
        .actions { display: flex; gap: 5px; margin-top: 10px; }
        .btn-small { padding: 5px; font-size: 11px; flex: 1; }
        .delete { background: #ff4757; color: white; }
        .edit { background: #ffa502; color: white; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 id="form-title">NOVO PEDIDO</h2>
    <input type="text" id="p-id" placeholder="Nº do Pedido (Ex: #01)">
    <input type="text" id="p-end" placeholder="Endereço (Ex: Rua Visconde de Nácar, 1440)">
    <input type="text" id="p-taxa" placeholder="Taxa R$">
    <button id="btn-main" class="btn-despachar">DESPACHAR PEDIDO</button>
    <button id="btn-cancel" style="display:none; background:#444; color:white;">CANCELAR</button>
    <div id="lista-pedidos"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const map = L.map('map').setView([-25.4351, -49.2786], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let editId = null;
    let markerEntregador = null;

    // Rastreio do Entregador no Mapa
    onSnapshot(doc(db, "entregadores", "entregador_joao"), (docSnap) => {
        const data = docSnap.data();
        if (data && data.lat && data.lng && data.status === "online") {
            const pos = [data.lat, data.lng];
            if (!markerEntregador) {
                markerEntregador = L.circleMarker(pos, { radius: 10, color: '#00bcd4', fillColor: '#00bcd4', fillOpacity: 1 }).addTo(map);
            } else { markerEntregador.setLatLng(pos); }
        } else if (markerEntregador) { map.removeLayer(markerEntregador); markerEntregador = null; }
    });

    // Lógica de Enviar/Editar Pedido
    document.getElementById('btn-main').onclick = async () => {
        const id = document.getElementById('p-id').value;
        const end = document.getElementById('p-end').value;
        const taxa = document.getElementById('p-taxa').value;

        const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end + ", Curitiba")}`);
        const data = await resp.json();
        if (data.length === 0) return alert("Endereço não encontrado!");

        const payload = { numero: id, endereco: end, taxa: taxa, lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };

        if (editId) { await updateDoc(doc(db, "pedidos", editId), payload); resetForm(); }
        else { await addDoc(collection(db, "pedidos"), { ...payload, criadoEm: serverTimestamp() }); resetForm(); }
    };

    onSnapshot(collection(db, "pedidos"), (snap) => {
        const lista = document.getElementById('lista-pedidos');
        lista.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            const div = document.createElement('div');
            div.className = "pedido-card";
            div.innerHTML = `<strong>Pedido ${p.numero}</strong><br><small>${p.endereco}</small>
                <div class="actions">
                    <button class="btn-small edit" onclick="prepararEdicao('${d.id}','${p.numero}','${p.endereco}','${p.taxa}')">EDITAR</button>
                    <button class="btn-small delete" onclick="removerPedido('${d.id}')">REMOVER</button>
                </div>`;
            lista.appendChild(div);
        });
    });

    window.prepararEdicao = (id, num, end, taxa) => {
        editId = id; document.getElementById('p-id').value = num;
        document.getElementById('p-end').value = end; document.getElementById('p-taxa').value = taxa;
        document.getElementById('btn-main').innerText = "SALVAR ALTERAÇÕES";
        document.getElementById('btn-main').className = "btn-salvar";
        document.getElementById('btn-cancel').style.display = "block";
    };

    window.removerPedido = async (id) => { if(confirm("Remover?")) await deleteDoc(doc(db, "pedidos", id)); };
    window.resetForm = () => { editId = null; document.getElementById('p-id').value = ""; document.getElementById('p-end').value = ""; document.getElementById('p-taxa').value = ""; document.getElementById('btn-cancel').style.display = "none"; document.getElementById('btn-main').innerText = "DESPACHAR"; document.getElementById('btn-main').className = "btn-despachar"; };
</script>
</body>
</html>
