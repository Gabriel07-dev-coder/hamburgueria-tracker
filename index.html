<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | Hamburgueria</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; }
        #map { height: 100vh; width: 100vw; position: fixed; z-index: 1; }
        .admin-bar {
            position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000;
            background: white; padding: 12px; border-radius: 12px;
            display: flex; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .admin-bar input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; color: #333; }
        .btn-add { background: #00bcd4; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .side-panel {
            position: absolute; top: 90px; left: 15px; width: 320px; z-index: 1000;
            background: rgba(30, 30, 30, 0.95); border-radius: 12px; padding: 15px;
            max-height: 75vh; overflow-y: auto; border: 1px solid #333;
        }
        .pedido-card { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00bcd4; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="admin-bar">
        <input type="text" id="p-id" placeholder="N°" style="width: 50px;">
        <input type="text" id="p-end" placeholder="Endereço (Rua, Número, Curitiba)" style="flex: 1;">
        <input type="text" id="p-taxa" placeholder="R$ Taxa" style="width: 80px;">
        <button class="btn-add" id="btn-adicionar">DESPACHAR</button>
    </div>
    <div class="side-panel">
        <h3 style="margin-top: 0; color: #00bcd4;">Pedidos em Tempo Real</h3>
        <div id="lista-pedidos"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script> 
</body>
</html>
