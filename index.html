<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Entregador | Scooby Dog</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100vw; position: fixed; z-index: 0; }

        /* Widget de Ganhos idêntico ao que você quer */
        .ganhos-entregador {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: #1e2124;
            color: #00bcd4;
            padding: 10px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
        }

        /* Status de Rastreamento Ativo */
        .status-tracker {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ganhos-entregador">
        <span style="color: #eee; font-size: 12px;">GANHOS DO DIA</span>
        <span id="valor-total-entregador">R$ 0,00</span>
    </div>

    <div class="status-tracker">
        <h2 style="margin: 0 0 10px 0;">Rastreamento Ativo</h2>
        <p style="color: #666; margin: 5px 0;">Olá, Ana! Sua posição está sendo enviada para a hamburgueria.</p>
        <div style="color: #2ed573; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px;">
            <span style="font-size: 18px;">📡</span> GPS Conectado
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicialização simples para o entregador
        const map = L.map('map', { zoomControl: false }).setView([-25.4614, -49.2275], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Simulação de atualização de ganhos
        function atualizarGanhos(valor) {
            document.getElementById('valor-total-entregador').innerText = `R$ ${valor.toFixed(2).replace('.', ',')}`;
        }
    </script>
</body>
</html>
