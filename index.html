<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foody Admin | Rota Fix</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

    <style>
        :root { --bg: #0f0f0f; --accent: #00bcd4; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; }
        header { height: 70px; background: #151515; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; gap: 10px; }
        .main-container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 300px; background: #151515; border-right: 1px solid #333; padding: 15px; }
        #map { flex: 1; z-index: 1; }
        input { background: #252525; border: 1px solid #333; padding: 8px; color: white; border-radius: 5px; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .pedido-card { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        /* Esconde o painel de texto da rota */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>
    <header>
        <strong style="color: var(--accent);">FOODY ADMIN</strong>
        <input type="text" id="p-id" placeholder="Nº" style="width: 40px;">
        <input type="text" id="p-end" placeholder="Endereço (Ex: Rua Visconde de Nácar, 1440)" style="flex: 1;">
        <input type="text" id="p-taxa" placeholder="R$" style="width: 60px;">
        <button id="btn-add">DESPACHAR</button>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Pedidos <span id="contador-pedidos">0</span></h3>
            <div id="lista-pedidos"></div>
        </aside>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
