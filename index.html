<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<style>
    /* Estilizando a barra de pesquisa para o seu Modo Dark */
    .leaflet-control-geocoder {
        background: rgba(13, 17, 23, 0.9) !important;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 8px !important;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5) !important;
    }
    .leaflet-control-geocoder-icon { background-color: transparent !important; filter: invert(1); }
    .leaflet-control-geocoder-form input { color: white !important; font-family: 'Poppins', sans-serif; }
    .leaflet-control-geocoder-alternatives { background: rgba(13, 17, 23, 0.95) !important; color: white; }
</style>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script>
    // Inicializa a barra de pesquisa (Google Maps Style)
    L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Pesquisar endereço para entrega...",
        errorMessage: "Endereço não encontrado."
    })
    .on('markgeocode', function(e) {
        var bbox = e.geocode.bbox;
        var poly = L.polygon([
            bbox.getSouthEast(),
            bbox.getNorthEast(),
            bbox.getNorthWest(),
            bbox.getSouthWest()
        ]);
        map.fitBounds(poly.getBounds()); // Faz o zoom automático na rua pesquisada
        
        // Opcional: Adiciona um marcador temporário no destino
        L.marker(e.geocode.center).addTo(map)
            .bindPopup(e.geocode.name)
            .openPopup();
    })
    .addTo(map);
</script>
