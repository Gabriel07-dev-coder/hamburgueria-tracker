<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Hamburgueria</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>

       #map {

    height: 100vh;

    width: 100%;

}

        body { margin: 0; }

    </style>

</head>

<body>

    <div id="map"></div>



    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">

        import { monitorarEntregador } from './app.js';



        // Inicializa o mapa em Curitiba

        const map = L.map('map').setView([-25.4431, -49.2761], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);



        let marker;



        // Monitora o ID da ANA

        monitorarEntregador('8zlr1Gb8EDj6JdRXHfNR', (data) => {

            const { lat, lng, nome } = data;

            console.log("Posição atualizada:", lat, lng);



            if (!marker) {

                marker = L.marker([lat, lng]).addTo(map).bindPopup(nome).openPopup();

            } else {

                marker.setLatLng([lat, lng]);

            }

            map.panTo([lat, lng]);

        });

    </script>

</body>

</html>
