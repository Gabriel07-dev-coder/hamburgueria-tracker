<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Monitoramento | Central</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>

<body>
    <div class="badge-online">SISTEMA DE RASTREIO ATIVO</div>
    <div id="map"></div>

    <script type="module" src="app.js"></script>

</html>
