<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="map"></div>

    <div class="top-bar glass-sidebar" style="top: 20px; left: 20px; right: 20px; display: flex; gap: 10px; position: absolute; z-index: 1000;">
    <input type="text" id="pedido-id" placeholder="100" style="width: 100px; padding: 10px; border-radius: 8px; border: none;">
    <input type="text" id="pedido-endereco" placeholder="Scooby Dog - Itupava" style="flex: 1; padding: 10px; border-radius: 8px; border: none;">
    <input type="text" id="pedido-taxa" placeholder="8,80" style="width: 100px; padding: 10px; border-radius: 8px; border: none;">
    
    <button onclick="adicionarNovoPedido()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Adicionar</button>
</div>

    <div class="left-panel glass-sidebar">
        <h3 class="panel-header">Foody Delivery</h3>
        <div class="status-buttons">
            <button class="status-btn active" data-status="ativos">Ativos</button>
            <button class="status-btn" data-status="finalizados">Finalizados</button>
        </div>
        <div id="lista-pedidos" class="pedidos-container">
            </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
