<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="map"></div>

    <div class="top-bar glass-sidebar">
        <input type="text" id="pedido-id" placeholder="N° do Pedido">
        <input type="text" id="pedido-endereco" placeholder="Endereço Completo (incluindo número)">
        <input type="text" id="pedido-taxa" placeholder="Taxa de Entrega (ex: 5.5)">
        <button id="add-pedido-btn">Adicionar</button>
    </div>

    <div class="left-panel glass-sidebar">
        <h3 class="panel-header">Foody Delivery</h3>
        <div class="status-buttons">
            <button class="status-btn active" data-status="ativos">Ativos</button>
            <button class="status-btn" data-status="finalizados">Finalizados</button>
        </div>
        <div id="lista-pedidos" class="pedidos-container">
            </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
