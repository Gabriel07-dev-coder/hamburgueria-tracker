<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FOODY ADMIN - Curitiba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #121212; color: white; font-family: sans-serif; }
        #sidebar { width: 350px; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        #map { flex: 1; z-index: 1; }
        input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-despachar { background: #00bcd4; color: white; }
        .pedido-card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid #00bcd4; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>NOVO PEDIDO</h2>
        <input type="text" id="p-id" placeholder="Nº do Pedido">
        <input type="text" id="p-end" placeholder="Endereço em Curitiba">
        <input type="text" id="p-taxa" placeholder="Taxa R$">
        <button id="btn-add" class="btn-despachar">DESPACHAR</button>
        <div id="lista-pedidos"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map').setView([-25.4351, -49.2786], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let markerEntregador = null;

        // Vê o entregador no mapa
        onSnapshot(doc(db, "entregadores", "entregador_joao"), (docSnap) => {
            const data = docSnap.data();
            if (data?.status === "online") {
                const pos = [data.lat, data.lng];
                if (!markerEntregador) markerEntregador = L.circleMarker(pos, { radius: 10, color: '#00bcd4', fillColor: '#00bcd4', fillOpacity: 1 }).addTo(map);
                else markerEntregador.setLatLng(pos);
            }
        });

        // Adiciona pedido
        document.getElementById('btn-add').onclick = async () => {
            const end = document.getElementById('p-end').value;
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end + ", Curitiba")}`);
            const data = await resp.json();
            if (data.length > 0) {
                await addDoc(collection(db, "pedidos"), { 
                    numero: document.getElementById('p-id').value, 
                    endereco: end, 
                    taxa: document.getElementById('p-taxa').value,
                    lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon),
                    criadoEm: serverTimestamp() 
                });
                alert("Pedido Enviado!");
            }
        };

        onSnapshot(collection(db, "pedidos"), (snap) => {
            const lista = document.getElementById('lista-pedidos');
            lista.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                lista.innerHTML += `<div class="pedido-card"><strong>Pedido ${p.numero}</strong><br><small>${p.endereco}</small></div>`;
            });
        });
    </script>
</body>
</html>
