<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Foody Admin | Gestão de Entregas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #00bcd4; --text: #fff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        header { height: 70px; background: #151515; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; gap: 20px; }
        .logo { font-weight: 800; color: var(--accent); font-size: 22px; }
        .dispatch-bar { flex: 1; display: flex; gap: 10px; }
        input { background: #252525; border: 1px solid #333; border-radius: 8px; padding: 10px; color: white; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .main-container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 350px; background: #151515; border-right: 1px solid #333; overflow-y: auto; padding: 15px; }
        #map { flex: 1; z-index: 1; }
        .pedido-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid var(--accent); position: relative; transition: 0.3s; }
        .pedido-card:hover { transform: translateX(5px); }
        .actions { display: flex; gap: 5px; margin-top: 10px; opacity: 0; transition: 0.3s; }
        .pedido-card:hover .actions { opacity: 1; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; color: white; }
        .btn-edit { background: #3498db; } .btn-del { background: #e74c3c; }
    </style>
</head>
<body>
    <header>
        <div class="logo">FOODY</div>
        <div class="dispatch-bar">
            <input type="text" id="p-id" placeholder="Nº" style="width: 50px;">
            <input type="text" id="p-end" placeholder="Endereço (Rua, Número, Curitiba)" style="flex: 1;">
            <input type="text" id="p-taxa" placeholder="Taxa R$">
            <button id="btn-add">DESPACHAR</button>
        </div>
    </header>
    <div class="main-container">
        <aside class="sidebar" id="lista-pedidos"></aside>
        <div id="map"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
