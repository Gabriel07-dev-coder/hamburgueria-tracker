<div class="glass-sidebar" style="left: auto; right: 20px; width: 300px;">
    <h3 style="text-align: center; color: #00ced1; margin-top: 0;">ENTREGAS</h3>
    
    <div class="delivery-list">
        <button class="route-btn active" onclick="focarRota(-25.4614, -49.2275, 'Rua João Guerino Fabri')">
            Rua João Guerino Fabri
        </button>
        <button class="route-btn" onclick="focarRota(-25.4411, -49.2120, 'Rua Bela Vista')">
            Rua Bela Vista
        </button>
        <button class="route-btn" onclick="focarRota(-25.4520, -49.2310, 'Rua Luiz')">
            Rua Luiz
        </button>
    </div>
</div>

<div class="glass-sidebar" style="top: auto; bottom: 20px; height: auto; padding: 15px; text-align: center;">
    <span style="font-size: 12px; opacity: 0.8;">ENTREGAS REALIZADAS</span>
    <div style="font-size: 32px; font-weight: bold; color: #00ced1; margin-top: 5px;">10</div>
</div>

<style>
    /* Estilos para os novos botões de rota */
    .route-btn {
        width: 100%;
        background: #008ba3;
        color: white;
        border: none;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 25px; /* Botão arredondado igual ao seu desenho */
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        transition: 0.3s;
        font-weight: 500;
    }

    .route-btn:hover {
        background: #00ced1;
        transform: translateY(-2px);
    }

    .route-btn.active {
        background: #00ced1;
        box-shadow: 0 0 15px rgba(0, 206, 209, 0.4);
    }
</style>

<script>
    // Função para focar o mapa no destino clicado
    function focarRota(lat, lng, nome) {
        map.flyTo([lat, lng], 16, { duration: 1.5 });
        
        // Adiciona um marcador de destino (opcional)
        L.marker([lat, lng]).addTo(map)
            .bindPopup("<b>Destino:</b><br>" + nome)
            .openPopup();
    }
</script>
