<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Entregador | GPS Ativo</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .status-card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 80%; }
        .pulse { width: 15px; height: 15px; background: #2ed573; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #2ed573; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="status-card">
        <div class="pulse"></div>
        <h2 id="status">Iniciando GPS...</h2>
        <p id="coords">Aguardando sinal...</p>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const entregadorId = "entregador_joao"; // ID fixo para o documento

        function iniciarRastreamento() {
            if (!navigator.geolocation) return alert("GPS não suportado");

            navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                document.getElementById('status').innerText = "TRANSMITINDO AO VIVO";
                document.getElementById('coords').innerText = `Lat: ${latitude.toFixed(5)} | Lng: ${longitude.toFixed(5)}`;

                try {
                    // Atualiza sempre o mesmo documento
                    await setDoc(doc(db, "entregadores", entregadorId), {
                        nome: "João Gabriel",
                        lat: latitude,
                        lng: longitude,
                        status: "online",
                        ultimaAtualizacao: serverTimestamp()
                    }, { merge: true });
                } catch (e) { console.error("Erro ao enviar:", e); }

            }, (err) => {
                document.getElementById('status').innerText = "ERRO NO GPS";
                console.error(err);
            }, { 
                enableHighAccuracy: true, 
                maximumAge: 0, 
                timeout: 5000 
            });
        }

        iniciarRastreamento();
    </script>
</body>
</html>
