<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foody Driver</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; background: #000; }
        #map { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Interface Superior (Ganhos) */
        .top-interface {
            position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none;
        }
        .ganhos-pill { 
            background: #1c1c1e; color: white; padding: 12px 25px; border-radius: 30px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333;
        }

        /* Interface Inferior (Status) */
        .bottom-interface {
            position: absolute; bottom: 0; width: 100%; z-index: 1000; pointer-events: none; padding: 20px; box-sizing: border-box;
        }
        .bottom-card { 
            background: white; border-radius: 25px; padding: 20px; pointer-events: auto;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2); 
        }
        .btn-status { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: #2ecc71; color: white; font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        .btn-status.offline { background: #333; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="top-interface">
        <div class="ganhos-pill" id="btn-ganhos">
            <span id="eye-icon" style="font-size: 20px;">👁️</span>
            <span style="border-left: 1px solid #444; height: 18px;"></span>
            <span id="txt-ganhos" style="font-weight: bold; font-size: 18px;">R$ 0,00</span>
            <span style="font-size: 10px; color: #888;">▲</span>
        </div>
    </div>

    <div class="bottom-interface">
        <div class="bottom-card">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <div style="width: 45px; height: 45px; background: #e8fcf1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2ecc71;">JG</div>
                <div>
                    <strong style="font-size: 18px;">João Gabriel</strong><br>
                    <small id="st-label" style="color: #999;">Curitiba, PR | Offline</small>
                </div>
            </div>
            <button id="btn-toggle" class="btn-status">ESTOU ONLINE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([-25.4351, -49.2786], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let isOnline = false, minhaPos = null, rotaControl = null, mostrarGanhos = true, saldoReal = 0;

        // SINCRONIZAÇÃO DE GANHOS
        onSnapshot(doc(db, "entregadores", "entregador_joao"), (docSnap) => {
            const data = docSnap.data();
            if (data && data.ganhos !== undefined) { 
                saldoReal = parseFloat(data.ganhos); 
                atualizarDisplayGanhos(); 
            }
        });

        document.getElementById('btn-ganhos').onclick = () => { 
            mostrarGanhos = !mostrarGanhos; 
            atualizarDisplayGanhos(); 
        };

        function atualizarDisplayGanhos() {
            const txt = document.getElementById('txt-ganhos');
            const eye = document.getElementById('eye-icon');
            if (mostrarGanhos) {
                txt.innerText = `R$ ${saldoReal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                eye.innerText = "👁️";
            } else {
                txt.innerText = "R$ ••••";
                eye.innerText = "🙈";
            }
        }

        // GPS E STATUS
        document.getElementById('btn-toggle').onclick = () => {
            isOnline = !isOnline;
            const btn = document.getElementById('btn-toggle');
            if (isOnline) {
                btn.innerText = "FICAR OFFLINE (PARAR)"; btn.classList.add('offline');
                document.getElementById('st-label').innerText = "Curitiba, PR | Online | Transmitindo";
                navigator.geolocation.watchPosition((pos) => {
                    minhaPos = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    map.panTo(minhaPos);
                    setDoc(doc(db, "entregadores", "entregador_joao"), { 
                        lat: pos.coords.latitude, lng: pos.coords.longitude, 
                        status: "online", ultimaAtualizacao: serverTimestamp() 
                    }, { merge: true });
                }, null, { enableHighAccuracy: true });
            } else { location.reload(); }
        };
    </script>
</body>
</html>
