<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregador | Scooby Dog</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-panel: #1e2124; --accent: #00bcd4; }
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #000; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Widget de Ganhos Superior */
        .earnings-card {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--bg-panel); color: white; padding: 10px 25px;
            border-radius: 30px; z-index: 1000; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .earnings-card .value { color: var(--accent); font-weight: 800; font-size: 18px; }

        /* Painel de Status Inferior */
        .status-bottom {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            background: white; border-radius: 20px; padding: 25px;
            z-index: 1000; text-align: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
        }
        .gps-status { color: #2ed573; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="earnings-card">
        <span style="font-size: 11px; font-weight: bold;">GANHOS DO DIA</span>
        <span class="value" id="valor-total">R$ 0,00</span>
    </div>

    <div class="status-bottom">
        <h2 style="margin: 0;">Rastreamento Ativo</h2>
        <p style="color: #666; font-size: 14px;">Olá, Ana! Sua posição está sendo enviada.</p>
        <div class="gps-status">📡 GPS Conectado</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([-25.4614, -49.2275], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    </script>
</body>
</html>
