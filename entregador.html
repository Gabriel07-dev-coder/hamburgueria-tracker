<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foody Driver</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; background: #000; }
        #map { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }
        .top-ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .ganhos-pill { background: #1c1c1e; color: white; padding: 12px 25px; border-radius: 30px; display: flex; align-items: center; gap: 15px; cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; }
        .bottom-ui { position: absolute; bottom: 0; width: 100%; z-index: 1000; padding: 20px; box-sizing: border-box; pointer-events: none; }
        .card { background: white; border-radius: 25px; padding: 20px; pointer-events: auto; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .btn-status { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #2ecc71; color: white; font-weight: bold; font-size: 16px; }
        .btn-status.off { background: #333; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="top-ui">
        <div class="ganhos-pill" id="btn-ganhos">
            <span id="eye">👁️</span>
            <span style="border-left: 1px solid #444; height: 18px;"></span>
            <span id="val" style="font-weight: bold; font-size: 18px;">R$ 0,00</span>
            <span style="font-size: 10px; color: #888;">▲</span>
        </div>
    </div>
    <div class="bottom-ui">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <div style="width: 45px; height: 45px; background: #e8fcf1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2ecc71;">JG</div>
                <div><strong>João Gabriel</strong><br><small id="st-text">Curitiba, PR | Offline</small></div>
            </div>
            <button id="toggle" class="btn-status">ESTOU ONLINE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, onSnapshot, setDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([-25.4351, -49.2786], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let isOn = false, mostrar = true, saldo = 0, minhaPos = null, rota = null;

        // Ganhos
        onSnapshot(doc(db, "entregadores", "entregador_joao"), (d) => {
            if (d.data()?.ganhos !== undefined) { saldo = parseFloat(d.data().ganhos); atualizar(); }
        });

        document.getElementById('btn-ganhos').onclick = () => { mostrar = !mostrar; atualizar(); };
        function atualizar() {
            document.getElementById('val').innerText = mostrar ? `R$ ${saldo.toFixed(2)}` : "R$ ••••";
            document.getElementById('eye').innerText = mostrar ? "👁️" : "🙈";
        }

        // Status e Rota
        onSnapshot(collection(db, "pedidos"), (s) => {
            if (rota) map.removeControl(rota);
            s.forEach(pDoc => {
                const p = pDoc.data();
                if (isOn && minhaPos && p.lat) {
                    rota = L.Routing.control({ waypoints: [minhaPos, L.latLng(p.lat, p.lng)], createMarker: () => null, show: false }).addTo(map);
                }
            });
        });

        document.getElementById('toggle').onclick = () => {
            isOn = !isOn;
            if (isOn) {
                document.getElementById('toggle').innerText = "FICAR OFFLINE";
                document.getElementById('toggle').classList.add('off');
                navigator.geolocation.watchPosition(p => {
                    minhaPos = L.latLng(p.coords.latitude, p.coords.longitude);
                    map.panTo(minhaPos);
                    setDoc(doc(db, "entregadores", "entregador_joao"), { lat: p.coords.latitude, lng: p.coords.longitude, status: "online" }, { merge: true });
                });
            } else { location.reload(); }
        };
    </script>
</body>
</html>
