<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador | Entregador</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-panel: #1e2124; --accent: #00bcd4; }
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #000; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .earnings-card {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--bg-panel); color: white; padding: 10px 25px;
            border-radius: 30px; z-index: 1000; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .status-bottom {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            background: white; border-radius: 20px; padding: 25px;
            z-index: 1000; text-align: center;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="earnings-card">
        <span style="font-size: 11px; font-weight: bold;">GANHOS DO DIA</span>
        <span style="color: var(--accent); font-weight: 800;" id="valor-total">R$ 0,00</span>
    </div>
    <div class="status-bottom">
        <h2 style="margin: 0;">Rastreamento Ativo</h2>
        <div id="status-texto" style="color: #2ed573; font-weight: bold; margin-top: 10px;">📡 GPS Conectado</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([-25.4351, -49.2786], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let userMarker;

        function rastrear() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                const latLng = [latitude, longitude];

                if (!userMarker) {
                    userMarker = L.circleMarker(latLng, {
                        radius: 10, fillColor: "#00bcd4", color: "white", weight: 3, fillOpacity: 1
                    }).addTo(map);
                } else {
                    userMarker.setLatLng(latLng);
                }
                map.panTo(latLng);

                await setDoc(doc(db, "rastreio", "entregador_1"), {
                    lat: latitude, lng: longitude, timestamp: Date.now()
                });
            }, null, { enableHighAccuracy: true });
        }
        rastrear();
    </script>
</body>
</html>
