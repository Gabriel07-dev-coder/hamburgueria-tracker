<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Entregador</title>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>body { margin: 0; background: #000; } #map { height: 100vh; }</style>
</head>
<body>
    <div id="map"></div>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map').setView([-25.4351, -49.2786], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker;

        navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            const latLng = [latitude, longitude];

            if (!marker) marker = L.circleMarker(latLng, { radius: 10, color: '#00bcd4' }).addTo(map);
            else marker.setLatLng(latLng);
            map.panTo(latLng);

            // Grava na coleção 'entregadores'
            await setDoc(doc(db, "entregadores", "entregador_1"), {
                nome: "João Gabriel",
                lat: latitude,
                lng: longitude,
                status: "online",
                lastUpdate: Date.now()
            }, { merge: true });
        }, null, { enableHighAccuracy: true });
    </script>
</body>
</html>
