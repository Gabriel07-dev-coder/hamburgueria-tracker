<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foody Driver</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; background: #000; }
        #map { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Pílula de Ganhos - Estilo 99 Identico */
        .top-ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .ganhos-pill { 
            background: #1c1c1e; color: white; padding: 10px 22px; border-radius: 30px; 
            display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid #333;
        }
        .separator { border-left: 1px solid #444; height: 18px; }
        
        /* Ajuste do ícone para ficar idêntico ao da imagem */
        #eye-icon { 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            width: 20px;
            justify-content: center;
        }

        /* Card Inferior */
        .bottom-ui { position: absolute; bottom: 0; width: 100%; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
        
        .btn-online { background: #2ecc71; color: white; }
        .btn-offline { background: #333; color: white; }
        .btn-iniciar { background: #ffa502; color: white; }
        .btn-finalizar { background: #00bcd4; color: white; }
        
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-ui">
        <div class="ganhos-pill" id="btn-ganhos">
            <span id="eye-icon">👁️</span> 
            <div class="separator"></div>
            <span id="txt-ganhos" style="font-weight: bold; font-size: 18px;">R$ 0,00</span>
            <span style="font-size: 10px; color: #888; margin-left: 3px;">▲</span>
        </div>
    </div>

    <div class="bottom-ui">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <div style="width: 45px; height: 45px; background: #e8fcf1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2ecc71;">JG</div>
                <div>
                    <strong>João Gabriel</strong><br>
                    <small id="st-label" style="color: #888;">Curitiba, PR | Offline</small>
                </div>
            </div>
            <button id="main-action" class="btn btn-online">FICAR ONLINE</button>
            <button id="stop-action" class="btn btn-offline" style="display: none;">FICAR OFFLINE (PARAR)</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([-25.4351, -49.2786], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let statusAtual = "offline";
        let mostrar = true;
        let saldo = 0;
        let markerJG = null;

        // Leitura do Firebase
        onSnapshot(doc(db, "entregadores", "entregador_joao"), (docSnap) => {
            const dados = docSnap.data();
            if (dados && dados.ganhos !== undefined) {
                saldo = parseFloat(dados.ganhos);
                atualizarVisao99();
            }
        });

        // Função de Atualização da Interface - Estilo Profissional da 99
        function atualizarVisao99() {
            const txt = document.getElementById('txt-ganhos');
            const eye = document.getElementById('eye-icon');
            
            if (mostrar) {
                // Formatação padrão 99
                txt.innerText = `R$ ${saldo.toFixed(2).replace('.',',')}`;
                eye.innerHTML = "👁️"; // Olho limpo conforme sua imagem
            } else {
                txt.innerText = "R$ ••••";
                eye.innerHTML = "<s>👁️</s>"; // Olho Riscado (Esconde Ganhos)
            }
        }

        document.getElementById('btn-ganhos').onclick = () => {
            mostrar = !mostrar;
            atualizarVisao99();
        };

        const btnMain = document.getElementById('main-action');
        const btnStop = document.getElementById('stop-action');

        btnMain.onclick = () => {
            if (statusAtual === "offline") {
                statusAtual = "online";
                btnMain.innerText = "INICIAR ENTREGA";
                btnMain.className = "btn btn-iniciar";
                btnStop.style.display = "block";
                iniciarGps();
            } else if (statusAtual === "online") {
                statusAtual = "em_rota";
                btnMain.innerText = "FINALIZAR ENTREGA";
                btnMain.className = "btn btn-finalizar";
            } else {
                statusAtual = "online";
                btnMain.innerText = "INICIAR ENTREGA";
                btnMain.className = "btn btn-iniciar";
            }
        };

        btnStop.onclick = () => { location.reload(); };

        function iniciarGps() {
            navigator.geolocation.watchPosition(p => {
                const pos = L.latLng(p.coords.latitude, p.coords.longitude);
                if (!markerJG) {
                    markerJG = L.circleMarker(pos, { radius: 10, color: '#00bcd4', fillColor: '#00bcd4', fillOpacity: 1 }).addTo(map);
                } else {
                    markerJG.setLatLng(pos);
                }
                map.panTo(pos);
                setDoc(doc(db, "entregadores", "entregador_joao"), { 
                    lat: p.coords.latitude, lng: p.coords.longitude, status: statusAtual 
                }, { merge: true });
            }, null, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
