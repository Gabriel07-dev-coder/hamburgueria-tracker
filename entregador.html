<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foody Driver</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; background: #000; }
        #map { position: absolute; top: 0; width: 100%; height: 100%; z-index: 1; }
        .top-ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .ganhos-pill { background: #1c1c1e; color: white; padding: 12px 25px; border-radius: 30px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .bottom-ui { position: absolute; bottom: 0; width: 100%; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .btn-status { width: 100%; padding: 18px; border-radius: 12px; border: none; background: #2ecc71; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-status.off { background: #333; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-ui">
        <div class="ganhos-pill" id="btn-ganhos">
            <span id="eye-icon">👁️</span>
            <span style="border-left: 1px solid #444; height: 18px;"></span>
            <span id="txt-ganhos" style="font-weight: bold; font-size: 18px;">R$ 0,00</span>
        </div>
    </div>

    <div class="bottom-ui">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                <div style="width: 45px; height: 45px; background: #e8fcf1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #2ecc71;">JG</div>
                <div>
                    <strong>João Gabriel</strong><br>
                    <small id="st-label">Curitiba, PR | Offline</small>
                </div>
            </div>
            <button id="toggle" class="btn-status">ESTOU ONLINE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, onSnapshot, setDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const map = L.map('map', { zoomControl: false }).setView([-25.4351, -49.2786], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let isOn = false;
        let mostrar = true;
        let saldo = 0;
        let minhaPos = null;
        let markerJG = null;
        let rota = null;

        // 1. Lógica dos Ganhos
        onSnapshot(doc(db, "entregadores", "entregador_joao"), (docSnap) => {
            const dados = docSnap.data();
            if (dados && dados.ganhos !== undefined) {
                saldo = parseFloat(dados.ganhos);
                atualizarTela();
            }
        });

        function atualizarTela() {
            document.getElementById('txt-ganhos').innerText = mostrar ? `R$ ${saldo.toFixed(2).replace('.',',')}` : "R$ ••••";
            document.getElementById('eye-icon').innerText = mostrar ? "👁️" : "🙈";
        }

        document.getElementById('btn-ganhos').onclick = () => { mostrar = !mostrar; atualizarTela(); };

        // 2. Lógica do GPS e Rota
        onSnapshot(collection(db, "pedidos"), (snap) => {
            if (rota) map.removeControl(rota);
            snap.forEach(pDoc => {
                const p = pDoc.data();
                if (isOn && minhaPos && p.lat) {
                    rota = L.Routing.control({
                        waypoints: [minhaPos, L.latLng(p.lat, p.lng)],
                        lineOptions: { styles: [{ color: '#00bcd4', weight: 6 }] },
                        createMarker: () => null,
                        show: false
                    }).addTo(map);
                }
            });
        });

        document.getElementById('toggle').onclick = () => {
            isOn = !isOn;
            const btn = document.getElementById('toggle');
            if (isOn) {
                btn.innerText = "FICAR OFFLINE (PARAR)";
                btn.classList.add('off');
                document.getElementById('st-label').innerText = "Curitiba, PR | Online | Transmitindo";
                
                navigator.geolocation.watchPosition(p => {
                    minhaPos = L.latLng(p.coords.latitude, p.coords.longitude);
                    
                    // Atualiza Ponto Azul
                    if (!markerJG) {
                        markerJG = L.circleMarker(minhaPos, { radius: 10, color: '#00bcd4', fillColor: '#00bcd4', fillOpacity: 1 }).addTo(map);
                    } else {
                        markerJG.setLatLng(minhaPos);
                    }
                    map.panTo(minhaPos);

                    // Envia pro Firebase
                    setDoc(doc(db, "entregadores", "entregador_joao"), { 
                        lat: p.coords.latitude, 
                        lng: p.coords.longitude, 
                        status: "online",
                        ultimaAtu: serverTimestamp()
                    }, { merge: true });
                }, null, { enableHighAccuracy: true });
            } else { location.reload(); }
        };
    </script>
</body>
</html>
