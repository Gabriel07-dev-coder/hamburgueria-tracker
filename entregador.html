<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foody Driver | Curitiba</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0c0d10; --accent: #25d366; --text: #ffffff; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }

        /* Mapa ocupa a tela toda */
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* Interface Sobreposta */
        .overlay-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px; box-sizing: border-box;
        }
        .overlay-ui > * { pointer-events: auto; }

        .header-controls { display: flex; justify-content: space-between; align-items: center; }
        .icon-btn { background: white; width: 45px; height: 45px; border-radius: 50%; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 18px; }
        
        .ganhos-pill { 
            background: black; color: white; padding: 10px 25px; border-radius: 30px; 
            font-weight: 800; font-size: 18px; display: flex; gap: 5px;
        }

        .bottom-panel {
            background: white; border-radius: 25px 25px 0 0; padding: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); text-align: center;
        }
        .btn-toggle {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: #333; color: white; font-weight: 800; font-size: 16px; margin-top: 15px;
        }
        .btn-toggle.online { background: var(--accent); }

        /* Esconde o painel de texto da rota para não cobrir o mapa */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay-ui">
        <div class="header-controls">
            <button class="icon-btn">☰</button>
            <div class="ganhos-pill">
                <span style="color: var(--accent);">R$</span> 
                <span id="total-ganhos">10,00</span>
            </div>
            <button class="icon-btn">🔍</button>
        </div>

        <div class="bottom-panel">
            <div style="display: flex; align-items: center; gap: 15px; text-align: left;">
                <div style="width: 50px; height: 50px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #25d366;">JG</div>
                <div>
                    <h3 style="margin: 0; font-size: 18px;">João Gabriel</h3>
                    <p id="status-label" style="margin: 0; font-size: 12px; color: #666;">Curitiba, PR | Offline</p>
                </div>
            </div>
            <button id="main-btn" class="btn-toggle">FICAR ONLINE (INICIAR)</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, setDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const entregadorId = "entregador_joao";
        let isOnline = false;
        let watchId = null;
        let rotaControl = null;
        let minhaPosicao = null;

        // Inicializa Mapa
        const map = L.map('map', { zoomControl: false }).setView([-25.4351, -49.2786], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 1. MONITORAR PEDIDOS PARA DESENHAR ROTA
        onSnapshot(collection(db, "pedidos"), (snap) => {
            if (rotaControl) { map.removeControl(rotaControl); rotaControl = null; }

            snap.forEach(d => {
                const p = d.data();
                if (p.lat && p.lng && minhaPosicao) {
                    // Se houver um pedido e o entregador estiver online, desenha a rota
                    rotaControl = L.Routing.control({
                        waypoints: [minhaPosicao, L.latLng(p.lat, p.lng)],
                        lineOptions: { styles: [{ color: '#00bcd4', weight: 6, opacity: 0.8 }] },
                        createMarker: () => null,
                        addWaypoints: false,
                        show: false
                    }).addTo(map);
                }
            });
        });

        // 2. ATUALIZAR LOCALIZAÇÃO
        async function updateGPS(pos) {
            const { latitude, longitude } = pos.coords;
            minhaPosicao = L.latLng(latitude, longitude);
            
            map.panTo(minhaPosicao);

            await setDoc(doc(db, "entregadores", entregadorId), {
                nome: "João Gabriel", lat: latitude, lng: longitude,
                status: "online", ultimaAtualizacao: serverTimestamp()
            }, { merge: true });
        }

        // 3. BOTÃO ONLINE/OFFLINE
        document.getElementById('main-btn').onclick = () => {
            const btn = document.getElementById('main-btn');
            isOnline = !isOnline;

            if (isOnline) {
                btn.innerText = "FICAR OFFLINE (PARAR)";
                btn.classList.add('online');
                document.getElementById('status-label').innerText = "Curitiba, PR | Online | Transmitindo";
                watchId = navigator.geolocation.watchPosition(updateGPS, null, { enableHighAccuracy: true });
            } else {
                btn.innerText = "FICAR ONLINE (INICIAR)";
                btn.classList.remove('online');
                document.getElementById('status-label').innerText = "Curitiba, PR | Offline";
                if (watchId) navigator.geolocation.clearWatch(watchId);
                if (rotaControl) map.removeControl(rotaControl);
                setDoc(doc(db, "entregadores", entregadorId), { status: "offline" }, { merge: true });
            }
        };
    </script>
</body>
</html>
